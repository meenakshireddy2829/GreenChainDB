
<!DOCTYPE html>
<html>
<head>
    <title>Collection Centers - GreenChain DB</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1b8f3f, #47c766);
            color: white;
            text-align: center;
            padding: 50px 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 45px;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 30px 0;
        }

        h2 {
            color: #1b8f3f;
            margin-bottom: 20px;
        }

        /* Form Card */
        form {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 40px;
        }

        label {
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #47c766;
            box-shadow: 0 0 8px rgba(71, 199, 102, 0.3);
        }

        button {
            background: linear-gradient(135deg, #1b8f3f, #47c766);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        th {
            background: linear-gradient(135deg, #1b8f3f, #47c766);
            color: white;
            padding: 15px;
        }

        td {
            padding: 15px;
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        /* Back Button */
        .back-link {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            color: #1b8f3f;
            font-weight: bold;
            font-size: 16px;
        }

        .back-link:hover {
            color: #47c766;
        }
    </style>

</head>

<body>

    <div class="header">
        <h1>🏢 Collection Centers</h1>
    </div>

    <div class="container">

        <h2>Add New Center</h2>

        <form method="POST">

            <label>Center Name</label>
            <input type="text" name="center_name" required>

            <label>Location</label>
            <input type="text" name="location" required>

            <button type="submit">Add Center</button>

        </form>

        <h2>Existing Centers</h2>

        <table>

            <tr>
                <th>ID</th>
                <th>Center Name</th>
                <th>Location</th>
            </tr>

            {% for center in centers %}
            <tr>
                <td>{{ center[0] }}</td>
                <td>{{ center[1] }}</td>
                <td>{{ center[2] }}</td>
            </tr>
            {% endfor %}

        </table>

        <a href="/" class="back-link">← Back to Dashboard</a>

    </div>

</body>
</html>
